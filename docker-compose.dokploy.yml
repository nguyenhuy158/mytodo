services:
  mytodo:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_TASK_POLLING_MS: ${NEXT_PUBLIC_TASK_POLLING_MS:-15000}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_BASE_URL: ${APP_BASE_URL:-https://task.huycode.click}
      AUTH_URL: ${AUTH_URL:-https://task.huycode.click}
      HOSTNAME: 0.0.0.0
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://task.huycode.click}
      NODE_ENV: production
      PORT: 3000
    expose:
      - "3000"
    networks:
      - dokploy-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "http://127.0.0.1:3000/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  dokploy-network:
    external: true
